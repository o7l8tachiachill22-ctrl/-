name: パパホリデー Cloudflare Pages デプロイ

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: ビルド & デプロイ
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: バージョン確認
        run: |
          node --version
          npm --version
          ls papaholiday/

      - name: 依存関係インストール
        working-directory: papaholiday
        run: npm install

      - name: ビルド
        working-directory: papaholiday
        run: npm run build

      - name: Cloudflare Pagesにデプロイ
        run: |
          npx wrangler pages project create papaholiday-site --production-branch=main || true
          npx wrangler pages deploy papaholiday/dist --project-name=papaholiday-site --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
