<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紬妃ちゃんキャラクター</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFF0F5 0%, #E8F0FF 100%);
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    }
    h1 {
      color: #E91E8C;
      font-size: 1.4rem;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    p {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(244,143,177,0.2);
    }
    .original {
      margin-top: 24px;
      text-align: center;
    }
    .original img {
      max-width: 220px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: rotate(90deg);
    }
    .label {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 8px;
    }
    .flex {
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .arrow {
      font-size: 2rem;
      color: #F48FB1;
    }
  </style>
</head>
<body>
  <h1>✦ 紬妃ちゃんキャラクター ✦</h1>
  <p>紬妃ちゃんの絵をキャラクターにしました！</p>
  <div class="flex">
    <div class="card">
      <div class="label">紬妃ちゃんの絵 ✏️</div>
      <img src="/root/.claude/uploads/2914d32c-cc9c-4827-b476-78bd767413d6/019dba49-20260423_2121042452558292523710492.jpg" alt="紬妃ちゃんの絵"/>
    </div>
    <div class="arrow">→</div>
    <div class="card">
      <div class="label">キャラクター ✦</div>
      <img src="tsumugi-character.svg" alt="紬妃ちゃんキャラクター" width="280"/>
    </div>
  </div>
</body>
</html>
